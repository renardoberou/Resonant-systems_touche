<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resonant Systems: Touché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;600;700&display=swap');
@import "tailwindcss";

@import url('https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#141208;font-family:'Courier New',monospace;overflow-x:hidden;min-height:100vh;min-height:-webkit-fill-available;min-height:100dvh}
::-webkit-scrollbar{width:4px;background:#141208}
::-webkit-scrollbar-thumb{background:#4A4438;border-radius:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes droneGlow{0%,100%{box-shadow:0 0 8px #F5890A55}50%{box-shadow:0 0 18px #F5890Aaa}}
@keyframes drawerUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes needleSwing{0%{transform:rotate(-28deg)}100%{transform:rotate(12deg)}}
@keyframes ledPulse {
  0%, 100% { box-shadow: 0 0 8px var(--led-color), 0 0 20px var(--led-color-fade); transform: scale(1); filter: brightness(1); }
  50% { box-shadow: 0 0 15px var(--led-color), 0 0 35px var(--led-color-fade); transform: scale(1.25); filter: brightness(1.8); }
}
select{-webkit-appearance:none;appearance:none;cursor:pointer;outline:none}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:#1A1810}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#F5890A;margin-top:-5px;box-shadow:0 1px 4px rgba(0,0,0,.6),0 0 6px #F5890A55}
input[type=range]::-moz-range-track{height:4px;border-radius:2px;background:#1A1810}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#F5890A;border:none}
button{font-family:'Courier New',monospace;cursor:pointer}
.pad-el{will-change:transform}
.therm-screw{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#D0B888,#6A5040);position:relative;flex-shrink:0}
.therm-screw::after{content:'';position:absolute;width:1px;height:5px;background:#2A1A10;top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg)}
.walnut-strip{height:10px;background:linear-gradient(180deg,#5C3018 0%,#7A4020 40%,#4A2810 100%);border-radius:6px 6px 0 0;box-shadow:inset 0 -1px 0 #2A1004;position:relative;overflow:hidden}
.walnut-strip::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(0,0,0,.12) 5px,rgba(0,0,0,.12) 6px)}
.walnut-strip-bot{border-radius:0 0 6px 6px;box-shadow:inset 0 1px 0 #2A1004}
.hammertone-body{background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 3px),repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px)}

    </style>
</head>
<body class="bg-[#141208] text-white">
    <div id="root"></div>
